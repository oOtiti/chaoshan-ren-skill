<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Teochew People Skill case demo</title>
  <desc id="desc">An animated README demo showing how the skill turns a generic film review into a culturally grounded Teochew People analysis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7eb"/>
      <stop offset="45%" stop-color="#f5e2c4"/>
      <stop offset="100%" stop-color="#d7eee8"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1">
      <stop offset="0%" stop-color="#221611"/>
      <stop offset="100%" stop-color="#5b1f16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#3b2014" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 800 54px system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; fill: url(#ink); letter-spacing: 0; }
      .subtitle { font: 500 24px system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; fill: #5d4034; }
      .label { font: 700 22px system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; fill: #7b2b20; }
      .body { font: 500 25px system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; fill: #2c211c; }
      .small { font: 500 20px system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; fill: #6d5146; }
      .tag { font: 700 21px system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; fill: #fffaf2; }
      .fade1 { animation: fade 6s ease-in-out infinite; }
      .fade2 { animation: fade 6s ease-in-out infinite 0.8s; }
      .fade3 { animation: fade 6s ease-in-out infinite 1.6s; }
      .flow { stroke-dasharray: 740; stroke-dashoffset: 740; animation: draw 6s ease-in-out infinite; }
      .pulse { transform-origin: center; animation: pulse 3s ease-in-out infinite; }
      .float { animation: float 4s ease-in-out infinite; }
      @keyframes fade {
        0%, 12% { opacity: 0; transform: translateY(14px); }
        22%, 78% { opacity: 1; transform: translateY(0); }
        88%, 100% { opacity: 0.35; transform: translateY(-4px); }
      }
      @keyframes draw {
        0% { stroke-dashoffset: 740; opacity: 0.25; }
        35%, 80% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0.25; }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.88; }
        50% { transform: scale(1.04); opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 116 C190 74 330 88 468 116 C632 150 808 148 990 105 C1108 77 1198 79 1280 96 L1280 0 L0 0 Z" fill="#b8422d" opacity="0.12"/>
  <path d="M0 622 C174 576 333 604 502 632 C716 666 892 623 1040 587 C1144 562 1224 566 1280 582 L1280 720 L0 720 Z" fill="#0d6b62" opacity="0.13"/>

  <text x="70" y="82" class="title">Teochew People (潮汕人) Skill</text>
  <text x="72" y="123" class="subtitle">把“泛泛亲情片影评”转成有侨乡、乡音和大潮汕视角的文化分析</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="500" height="410" rx="22" fill="#fffaf2"/>
    <rect x="710" y="170" width="500" height="410" rx="22" fill="#fffaf2"/>
  </g>

  <text x="102" y="220" class="label">普通模型容易写成</text>
  <text x="102" y="276" class="body">“一部潮汕方言亲情片。”</text>
  <text x="102" y="324" class="body">“表达潮汕人重家庭。”</text>
  <text x="102" y="372" class="body">“有地方特色，很感人。”</text>
  <text x="102" y="456" class="small">问题：泛、窄、标签化，错过侨批与乡音。</text>

  <path class="flow" d="M595 365 C635 320 675 320 710 365" fill="none" stroke="#b8422d" stroke-width="7" stroke-linecap="round"/>
  <circle cx="650" cy="348" r="44" fill="#b8422d" class="pulse"/>
  <text x="625" y="356" class="tag">Skill</text>

  <text x="742" y="220" class="label">使用 skill 后会抓住</text>
  <g class="fade1">
    <rect x="742" y="248" width="390" height="46" rx="23" fill="#7b2b20"/>
    <text x="766" y="279" class="tag">侨批：钱与信一起回家</text>
  </g>
  <g class="fade2">
    <rect x="742" y="314" width="390" height="46" rx="23" fill="#0d6b62"/>
    <text x="766" y="345" class="tag">阿嬷：代际情感的入口</text>
  </g>
  <g class="fade3">
    <rect x="742" y="380" width="390" height="46" rx="23" fill="#9b6a22"/>
    <text x="766" y="411" class="tag">乡音：最难翻译的亲近</text>
  </g>
  <text x="742" y="488" class="body">从“亲情片”推进到：</text>
  <text x="742" y="532" class="body">下南洋、侨乡、潮汕话、</text>
  <text x="742" y="576" class="body">汕潮揭与海外潮人社群。</text>

  <g class="float" opacity="0.82">
    <circle cx="1060" cy="108" r="28" fill="#fffaf2"/>
    <circle cx="1110" cy="108" r="28" fill="#fffaf2"/>
    <circle cx="1160" cy="108" r="28" fill="#fffaf2"/>
    <path d="M1042 100 h136" stroke="#7b2b20" stroke-width="4" stroke-linecap="round"/>
  </g>
  <path d="M88 637 h1104" stroke="#221611" stroke-opacity="0.16" stroke-width="2"/>
  <text x="92" y="675" class="small">不是替代研究，而是让 agent 先学会范围、分寸、来源与地方感。</text>
</svg>
